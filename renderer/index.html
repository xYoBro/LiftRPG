<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LiftRPG Renderer</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}

/* ── DESIGN TOKENS ─────────────────────────────── */
:root{
  --paper:#f1ebe0; --ink:#181714;   --card:#ece6d8;
  --accent:#8b2a2a;--muted:#857d72; --rule:#ccc5b6;
  --warm:#e8dfc8;  --fog:#ddd6c5;
  --box-bg:#fff;   --ghost:rgba(0,0,0,.08);
  --notes-bg:rgba(255,255,255,.45);
  --serif:'Libre Baskerville',Georgia,serif;
  --mono:'Share Tech Mono',monospace;
  --display:'Playfair Display',Georgia,serif;
}

/* ── PRINT COLOUR ──────────────────────────────── */
body{
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

/* ── SPREAD ────────────────────────────────────── */
body{
  background:#2a2724;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:32px;
  min-height:100vh;
}
.spread{
  display:flex;
  width:11in;
  height:8.5in;
  box-shadow:0 8px 48px rgba(0,0,0,.6);
  position:relative;
}
.page{
  width:5.5in;
  height:8.5in;
  padding:0.38in 0.42in;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.page-left{ background:var(--paper); }
.page-right{ background:var(--warm); border-left:1px solid var(--rule); }

/* ── GRAIN ─────────────────────────────────────── */
.page::before{
  content:'';
  position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
}
.page>*{position:relative;z-index:1;}

/* ── PAGE HEADER ───────────────────────────────── */
.page-header{
  display:flex;justify-content:space-between;align-items:baseline;
  padding-bottom:5px;margin-bottom:8px;
  border-bottom:1.5px solid var(--ink);
  flex-shrink:0;
}
.page-header-title{
  font-family:var(--mono);font-size:6.5pt;color:var(--muted);
  letter-spacing:.14em;text-transform:uppercase;
}
.page-header-num{
  font-family:var(--mono);font-size:6.5pt;color:var(--muted);
}

/* ── WEEK BLOCK ────────────────────────────────── */
.week-block{margin-bottom:8px;flex-shrink:0;}
.week-kicker{
  font-family:var(--mono);font-size:6.5pt;color:var(--accent);
  letter-spacing:.22em;text-transform:uppercase;
  display:block;margin-bottom:2px;
}
.week-title{
  font-family:var(--display);font-style:italic;font-size:14pt;
  color:var(--ink);line-height:1.1;display:block;margin-bottom:3px;
}
.week-epigraph{
  font-family:var(--serif);font-style:italic;font-size:5.5pt;
  color:var(--muted);line-height:1.4;
}
.week-epigraph-attr{
  display:block;margin-top:2px;
  font-family:var(--mono);font-style:normal;
  font-size:4.5pt;color:var(--muted);letter-spacing:.06em;
}

/* ── SESSION CARDS ─────────────────────────────── */
.cards{
  display:flex;flex-direction:column;
  flex:1;gap:5px;min-height:0;
}
.card{
  flex:1;display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--fog);
  border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06);
  overflow:hidden;min-height:0;
}
.card-header{
  font-family:var(--mono);font-size:6.5pt;
  color:var(--ink);letter-spacing:.14em;text-transform:uppercase;
  padding:4px 6px 3px;
  border-bottom:1px solid var(--rule);
  flex-shrink:0;
  font-weight:700;
}
.card-body{
  padding:3px 6px 4px;display:flex;flex-direction:column;flex:1;min-height:0;
}
.card-prompt{
  font-family:var(--serif);font-style:italic;font-size:6.5pt;
  color:var(--muted);line-height:1.4;
  border-left:1.5px solid var(--accent);padding-left:6px;
  margin-bottom:4px;flex-shrink:0;
}
.card-ref{
  font-family:var(--mono);font-style:normal;font-size:5.5pt;
  color:var(--muted);text-align:right;
  display:block;margin-top:3px;
  flex-shrink:0;
}

/* ── EXERCISE GRID (leader-dot layout) ─────────── */
.ex-grid{
  display:grid;
  gap:2px 4px;
  align-items:center;
  margin-bottom:3px;flex-shrink:0;
}
.ex-grid-cell{
  display:flex;align-items:baseline;
  gap:4px;overflow:hidden;padding:2px 0;
}
.ex-grid-name{
  font-family:var(--serif);font-size:7pt;font-weight:700;
  color:var(--ink);line-height:1.15;text-transform:uppercase;
  flex-shrink:0;
}
.ex-grid-wt{
  font-family:var(--mono);font-size:5.5pt;color:var(--muted);
  white-space:nowrap;flex-shrink:0;
}
.ex-grid-leader{
  flex:1;min-width:8px;
  border-bottom:1px dotted var(--rule);
  margin-bottom:2px;
}
.ex-sbox{
  width:18px;height:18px;
  border:1.5px solid var(--ink);border-radius:2px;
  background:var(--box-bg);justify-self:center;
  position:relative;
}
.ex-sbox-ghost{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:5pt;
  color:var(--ghost);pointer-events:none;
  line-height:1;
}
.ex-sbox-empty{ width:18px; }

/* ── NOTES SECTION ─────────────────────────────── */
.notes-section{
  flex:1;min-height:24px;
  border:1px solid var(--fog);border-radius:2px;
  padding:3px 5px;
  background:var(--notes-bg);
  display:flex;flex-direction:column;
}
.notes-section-lbl{
  font-family:var(--mono);font-size:5pt;color:var(--rule);
  letter-spacing:.14em;text-transform:uppercase;line-height:1;
  margin-bottom:2px;flex-shrink:0;
}
.notes-section-lines{
  flex:1;min-height:12px;
  background-image:repeating-linear-gradient(
    to bottom,
    transparent,transparent 12px,
    rgba(204,197,182,.65) 12px,rgba(204,197,182,.65) 13px
  );
  background-position:0 11px;
}

/* ── RIGHT PAGE ────────────────────────────────── */
.section-heading{
  font-family:var(--mono);font-size:7pt;color:var(--muted);
  letter-spacing:.2em;text-transform:uppercase;
  display:block;margin-bottom:3px;
}

/* ── MAP ───────────────────────────────────────── */
.map-block{flex-shrink:0;margin-bottom:8px;}
.map-floor-label{
  font-family:var(--display);font-style:italic;font-size:11pt;
  color:var(--ink);
  margin-bottom:12px;display:block;line-height:1.2;
}
.map-grid-wrap{
  border:1px solid var(--rule);padding:16px;
  margin-bottom:4px;
}
.map-grid{
  display:grid;gap:2px;width:100%;
}
.map-tile{
  aspect-ratio:1.2;border:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:5.5pt;color:var(--ink);
  position:relative;line-height:1;
}
.tile-empty{ background:var(--box-bg); }
.tile-cleared{
  background:
    repeating-linear-gradient(
      45deg,
      transparent,transparent 3px,
      var(--rule) 3px,var(--rule) 3.5px
    );
  background-color:var(--box-bg);
}
.tile-locked{
  background:
    radial-gradient(circle, var(--rule) .4px, transparent .4px);
  background-size:9px 9px;
  background-color:var(--paper);
  border-color:rgba(204,197,182,.3);
  color:var(--muted);
}
.tile-anomaly{
  background:
    repeating-linear-gradient(
      45deg,transparent,transparent 2.5px,
      var(--muted) 2.5px,var(--muted) 3px
    ),
    repeating-linear-gradient(
      -45deg,transparent,transparent 2.5px,
      var(--muted) 2.5px,var(--muted) 3px
    );
  background-color:var(--box-bg);
  border:2px solid var(--ink);
  color:var(--ink);font-weight:700;
}
.tile-current{
  background:var(--ink);color:var(--paper);
  border-color:var(--ink);
}
.tile-inaccessible{
  background:var(--ink);color:var(--ink);
  border-color:var(--ink);
}
.map-annotations{
  margin-top:3px;
  font-family:var(--serif);font-style:italic;font-size:5pt;
  color:var(--muted);line-height:1.5;
}
.map-annotations span{
  font-family:var(--mono);font-style:normal;font-weight:700;
  color:var(--ink);
}
.map-note{
  font-family:var(--mono);font-size:5.5pt;color:var(--muted);
  margin-top:3px;line-height:1.4;
}

/* ── CIPHER ────────────────────────────────────── */
.cipher-block{flex-shrink:0;margin-bottom:8px;}
.cipher-title{
  font-family:var(--mono);font-size:5.5pt;color:var(--ink);
  letter-spacing:.08em;margin-bottom:3px;display:block;
}
.cipher-display{
  font-family:var(--mono);font-size:6pt;color:var(--ink);
  line-height:1.55;white-space:pre-wrap;margin-bottom:2.5px;
}
.cipher-key{
  font-family:var(--mono);font-size:5.5pt;color:var(--muted);
  line-height:1.45;margin-bottom:2.5px;font-style:italic;
}
.workspace{margin-bottom:2px;max-height:60px;overflow:hidden;}
.workspace-boxgrid{display:flex;flex-wrap:wrap;gap:2px;}
.workspace-ruled-line{
  border-bottom:1px solid var(--rule);height:16px;
}
.workspace-dotgrid{
  background:
    radial-gradient(circle,var(--rule) .5px,transparent .5px);
  background-size:7px 7px;
  border:1px solid var(--fog);border-radius:2px;
}
.cipher-instruction{
  font-family:var(--mono);font-size:7.5pt;color:var(--muted);
  letter-spacing:.04em;line-height:1.45;
  border-top:1px solid var(--rule);padding-top:4px;margin-top:1px;
}

/* ── ORACLE ────────────────────────────────────── */
.oracle-block{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid var(--rule);padding-top:5px;}
.oracle-title{
  font-family:var(--mono);font-size:5.5pt;color:var(--ink);
  letter-spacing:.08em;margin-bottom:1px;display:block;
}
.oracle-instruction{
  font-family:var(--mono);font-size:5pt;color:var(--muted);
  margin-bottom:4px;display:block;line-height:1.4;
}
.oracle-entries{flex:1;min-height:0;}
.oracle-entry{
  display:grid;grid-template-columns:16px 1fr;gap:4px;
  padding:1.5px 0;border-bottom:1px dotted var(--rule);
  align-items:baseline;
}
.oracle-entry:nth-child(even){background:rgba(0,0,0,.03);}
.oracle-entry:last-child{border-bottom:none;}
.oracle-roll{
  font-family:var(--mono);font-size:5.5pt;font-weight:700;
  color:var(--ink);text-align:right;
}
.oracle-text{
  font-family:var(--mono);font-size:5.5pt;color:var(--ink);
  line-height:1.4;
}

/* ── ORACLE MODE B (d100 clusters) ─────────────── */
.oracle-cluster-hdr{
  font-family:var(--mono);font-size:5pt;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;
  padding:2px 0 1px;border-bottom:1px solid var(--fog);
  margin-top:4px;
}
.oracle-entries .oracle-cluster-hdr:first-child{ margin-top:0; }
.oracle-entry-b{
  display:grid;grid-template-columns:22px 1fr auto;gap:3px;
  padding:1px 0;border-bottom:1px dotted var(--rule);
  align-items:baseline;
}
.oracle-entry-b:last-child{ border-bottom:none; }
.oracle-entry-b .oracle-roll{ color:var(--muted); }
.oracle-fragref{
  font-family:var(--mono);font-size:5pt;color:var(--accent);
  text-align:right;white-space:nowrap;
}

/* ── PRINT ─────────────────────────────────────── */
@page{ size:11in 8.5in landscape; margin:0; }
@media print{
  body{background:none;padding:0;display:block;}
  .spread{box-shadow:none;margin:0;}
}
</style>
</head>

/* ── RENDER ────────────────────────────────────── */
(function(){
  var week = DATA.weeks[0];
  var spread = document.getElementById('spread');
  spread.appendChild(renderLeftPage(week, DATA.meta));
  spread.appendChild(renderRightPage(week));
})();

/* ── LEFT PAGE ─────────────────────────────────── */
function renderLeftPage(week, meta){
  var page = el('div','page page-left');

  /* Page header */
  var hdr = el('div','page-header');
  hdr.appendChild(span('page-header-title', meta.blockTitle));
  hdr.appendChild(span('page-header-num', 'p.03'));
  page.appendChild(hdr);

  /* Week block */
  var wb = el('div','week-block');
  wb.appendChild(span('week-kicker','Week 0' + week.weekNumber + ' \u00b7'));
  wb.appendChild(span('week-title', week.title));
  if(week.epigraph){
    var eq = el('div','week-epigraph');
    eq.appendChild(document.createTextNode(week.epigraph.text));
    var attr = span('week-epigraph-attr', '\u2014 ' + week.epigraph.attribution);
    eq.appendChild(attr);
    wb.appendChild(eq);
  }
  page.appendChild(wb);

  /* Session cards */
  var cards = el('div','cards');
  week.sessions.forEach(function(s){
    cards.appendChild(renderCard(s));
  });
  page.appendChild(cards);

  return page;
}

/* ── SESSION CARD ──────────────────────────────── */
function renderCard(s){
  var card = el('div','card');

  /* Header — typographic label */
  card.appendChild(span('card-header','Session ' + s.sessionNumber + ' \u00b7 ' + s.label));

  /* Body */
  var body = el('div','card-body');

  /* Story prompt */
  var prompt = el('div','card-prompt');
  prompt.appendChild(document.createTextNode(s.storyPrompt));
  body.appendChild(prompt);

  /* Fragment ref — separated, flush-right */
  if(s.fragmentRef){
    body.appendChild(span('card-ref', '\u2192 ' + s.fragmentRef));
  }

  /* Exercise grid — leader-dot layout: 1fr + N set columns */
  var maxSets = Math.max.apply(null, s.exercises.map(function(e){ return e.sets; }));
  var colDef = '1fr';
  for(var ci = 0; ci < maxSets; ci++) colDef += ' 18px';

  var grid = el('div','ex-grid');
  grid.style.gridTemplateColumns = colDef;

  /* Exercise rows — no header, no separators */
  s.exercises.forEach(function(ex){
    /* Merged cell: NAME · WEIGHT ····· */
    var cell = el('div','ex-grid-cell');
    cell.appendChild(span('ex-grid-name', ex.name));
    if(ex.weightField){
      cell.appendChild(span('ex-grid-wt', ex.weightField));
    }
    cell.appendChild(el('div','ex-grid-leader'));
    grid.appendChild(cell);

    /* Set boxes with ghost label (reps, duration, or AMRAP) */
    var ghostText = ex.ghostLabel || String(ex.repsPerSet);
    for(var si = 0; si < maxSets; si++){
      if(si < ex.sets){
        var box = el('div','ex-sbox');
        var ghost = span('ex-sbox-ghost', ghostText);
        box.appendChild(ghost);
        grid.appendChild(box);
      } else {
        grid.appendChild(el('div','ex-sbox-empty'));
      }
    }
  });

  body.appendChild(grid);

  /* Notes section */
  var notes = el('div','notes-section');
  notes.appendChild(span('notes-section-lbl','Notes'));
  notes.appendChild(el('div','notes-section-lines'));
  body.appendChild(notes);

  card.appendChild(body);
  return card;
}

/* ── RIGHT PAGE ────────────────────────────────── */
function renderRightPage(week){
  var page = el('div','page page-right');
  var fo = week.fieldOps;

  /* Page header */
  var hdr = el('div','page-header');
  hdr.appendChild(span('page-header-title', 'Field Operations'));
  hdr.appendChild(span('page-header-num', 'p.04'));
  page.appendChild(hdr);

  /* Map */
  page.appendChild(renderMap(fo.mapState));

  /* Cipher */
  page.appendChild(renderCipher(fo.cipher));

  /* Oracle */
  page.appendChild(renderOracle(fo.oracleTable));

  return page;
}

/* ── MAP ───────────────────────────────────────── */
function renderMap(ms){
  var block = el('div','map-block');
  block.appendChild(span('map-floor-label', ms.floorLabel));

  var grid = el('div','map-grid');
  grid.style.gridTemplateColumns = 'repeat(' + ms.gridDimensions.columns + ', 1fr)';

  /* Build tile lookup + collect annotations */
  var lookup = {};
  var annotations = [];
  ms.tiles.forEach(function(t){
    lookup[t.col + ',' + t.row] = t;
    if(t.annotation) annotations.push({ label: t.label || (t.col + '-' + t.row), text: t.annotation });
  });

  for(var r = 1; r <= ms.gridDimensions.rows; r++){
    for(var c = 1; c <= ms.gridDimensions.columns; c++){
      var t = lookup[c + ',' + r] || { type: 'empty' };
      var cell = el('div','map-tile tile-' + t.type);
      if(t.label){
        cell.textContent = t.label;
      }
      grid.appendChild(cell);
    }
  }
  var gridWrap = el('div','map-grid-wrap');
  gridWrap.appendChild(grid);
  block.appendChild(gridWrap);

  /* Annotations as margin-style notes below grid */
  if(annotations.length){
    var annBlock = el('div','map-annotations');
    annotations.forEach(function(a, i){
      if(i > 0) annBlock.appendChild(document.createTextNode(' \u00b7 '));
      annBlock.appendChild(span('', a.label + ': '));
      annBlock.appendChild(document.createTextNode(a.text));
    });
    block.appendChild(annBlock);
  }

  if(ms.mapNote){
    block.appendChild(span('map-note', ms.mapNote));
  }
  return block;
}

/* ── CIPHER ────────────────────────────────────── */
function renderCipher(c){
  var block = el('div','cipher-block');
  block.appendChild(span('section-heading','Field Procedures'));
  block.appendChild(span('cipher-title', c.title));

  /* Display text */
  var display = el('pre','cipher-display');
  display.textContent = c.body.displayText;
  block.appendChild(display);

  /* Key */
  if(c.body.key){
    var keyEl = el('p','cipher-key');
    keyEl.textContent = c.body.key;
    block.appendChild(keyEl);
  }

  /* Workspace */
  if(c.body.workSpace){
    var ws = el('div','workspace');
    var style = c.body.workSpace.style;
    var rows = c.body.workSpace.rows || 3;

    if(style === 'boxgrid'){
      var bg = el('div','workspace-boxgrid');
      /* 12 boxes per row × number of rows */
      for(var i = 0; i < 12 * rows; i++){
        bg.appendChild(el('span','rep-box'));
      }
      ws.appendChild(bg);
    } else if(style === 'ruled'){
      for(var j = 0; j < rows; j++){
        ws.appendChild(el('div','workspace-ruled-line'));
      }
    } else {
      var dg = el('div','workspace-dotgrid');
      dg.style.height = (rows * 16) + 'px';
      ws.appendChild(dg);
    }
    block.appendChild(ws);
  }

  /* Extraction instruction */
  block.appendChild(span('cipher-instruction', c.extractionInstruction));

  return block;
}

/* ── ORACLE ────────────────────────────────────── */
function renderOracle(o){
  var block = el('div','oracle-block');
  block.appendChild(span('section-heading','Incident Classification'));
  block.appendChild(span('oracle-title', o.title));

  var n = o.entries.length;
  var isModeA = (n === 11);   /* 2d6 — rolls 2–12 */
  var isModeB = (n === 100);  /* d100 — 10 clusters of 10 */

  /* Instruction — auto-text for Mode B */
  var instrText = isModeB
    ? 'Roll d100. Find cluster matching your tens digit, row matching your ones digit.'
    : o.instruction;
  block.appendChild(span('oracle-instruction', instrText));

  var entries = el('div','oracle-entries');

  if(isModeB){
    /* Mode B: 10 clusters of 10 */
    for(var cluster = 0; cluster < 10; cluster++){
      var lo = cluster * 10;
      var hi = lo + 9;
      var hdr = el('div','oracle-cluster-hdr');
      hdr.textContent = (lo < 10 ? '0' + lo : String(lo)) + '\u2013' + String(hi);
      entries.appendChild(hdr);
      var slice = o.entries.slice(lo, hi + 1);
      slice.forEach(function(e){
        var row = el('div','oracle-entry-b');
        row.appendChild(span('oracle-roll', (e.roll < 10 ? '0' + e.roll : String(e.roll))));
        row.appendChild(span('oracle-text', e.text));
        row.appendChild(span('oracle-fragref', e.fragmentRef ? '\u2192 ' + e.fragmentRef : ''));
        entries.appendChild(row);
      });
    }
  } else if(isModeA){
    /* Mode A: standard 2d6 table */
    o.entries.forEach(function(e){
      var row = el('div','oracle-entry');
      row.appendChild(span('oracle-roll', String(e.roll)));
      var fullText = e.text;
      if(e.fragmentRef){ fullText += ' \u2192 ' + e.fragmentRef; }
      var textEl = span('oracle-text','');
      textEl.textContent = fullText;
      row.appendChild(textEl);
      entries.appendChild(row);
    });
  } else {
    /* Fallback: any other count — simple numbered list */
    o.entries.forEach(function(e){
      var row = el('div','oracle-entry');
      row.appendChild(span('oracle-roll', String(e.roll)));
      row.appendChild(span('oracle-text', e.text || ''));
      entries.appendChild(row);
    });
  }

  block.appendChild(entries);
  return block;
}

/* ── HELPERS ───────────────────────────────────── */
function el(tag, cls){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  return e;
}
function span(cls, text){
  var s = document.createElement('span');
  if(cls) s.className = cls;
  if(text !== undefined) s.textContent = text;
  return s;
}
</script>
