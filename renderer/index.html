<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftRPG &mdash; Render</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="booklet.css?v=44" />
</head>

<body>

  <!-- ── APP CONTROLS (hidden in print) ─────────────── -->
  <div class="app-chrome no-print">
    <div class="app-header">
      <a href="../" class="app-back"><span class="back-chevron">&#x2039;</span>LIFTRPG</a>
      <span class="app-version">Render</span>
    </div>

    <div class="app-toolbar">
      <label class="upload-btn" for="json-input">
        <span class="upload-icon">&#x2B06;</span> Load JSON
        <input type="file" id="json-input" accept=".json" hidden />
      </label>
      <button id="print-btn" disabled>Print Booklet</button>
      <label class="view-toggle">
        Preview:
        <select id="layout-mode" class="mode-select">
          <option value="single">Single Page</option>
          <option value="spread">Reader Spread</option>
          <option value="booklet">Printer Spread</option>
        </select>
      </label>
    </div>
    <div id="encrypt-row" class="author-tools" style="display:none;">
      <span class="author-tools-label">Author Tools</span>
      <input id="encrypt-password" type="text" placeholder="Set ending password" spellcheck="false" autocomplete="off"
        autocapitalize="characters" />
      <button id="encrypt-btn" type="button">Encrypt Ending</button>
      <button id="encrypt-download" type="button" style="display:none;">Download JSON</button>
      <span id="encrypt-status" class="encrypt-status"></span>
    </div>
    <div id="status" class="app-status"></div>
  </div>

  <!-- ── BOOKLET OUTPUT ─────────────────────────────── -->
  <div id="booklet-container"></div>
  <div id="unlock-row" class="reader-unlock no-print" style="display:none;" data-state="locked">
    <div class="reader-unlock-bar">
      <div class="reader-unlock-copy">
        <span class="unlock-icon">&#x1F512;</span>
        <span id="unlock-label" class="reader-unlock-label">Try decrypting the ending:</span>
      </div>
      <input id="unlock-password" class="reader-unlock-input" type="text" placeholder="ENTER PASSWORD"
        spellcheck="false" autocomplete="off" autocapitalize="characters" />
      <button id="unlock-btn" class="reader-unlock-btn" type="button">Unlock</button>
      <span id="unlock-status" class="reader-unlock-status"></span>
    </div>
    <div class="reader-unlock-hint">Scroll to explore the full booklet</div>
  </div>

  <!-- PDF generation (Safari can't print booklet spreads via CSS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script type="module" src="renderer.js?v=45"></script>
</body>

</html>
