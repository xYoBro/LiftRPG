<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftRPG &mdash; Render</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="booklet.css?v=5" />
</head>

<body>

  <!-- ── APP CONTROLS (hidden in print) ─────────────── -->
  <div class="app-chrome no-print">
    <div class="app-header">
      <a href="../" class="app-back"><span class="back-chevron">&#x2039;</span>LIFTRPG</a>
      <span class="app-version">Render</span>
    </div>

    <div class="app-toolbar">
      <div id="encrypt-row" class="app-encrypt" style="display:none;">
        <span class="encrypt-icon">&#x1F510;</span>
        <input id="encrypt-password" type="text" placeholder="Enter password" spellcheck="false" autocomplete="off"
          autocapitalize="characters" />
        <button id="encrypt-btn" type="button">Encrypt</button>
        <button id="encrypt-download" type="button" style="display:none;">Download JSON</button>
        <span id="encrypt-status" class="encrypt-status"></span>
      </div>

      <div id="unlock-row" class="app-unlock" style="display:none;">
        <span class="unlock-icon">&#x1F512;</span>
        <input id="unlock-password" type="text" placeholder="Enter password" spellcheck="false" autocomplete="off"
          autocapitalize="characters" />
        <button id="unlock-btn" type="button">Unlock</button>
        <span id="unlock-status" class="unlock-status"></span>
      </div>

      <label class="upload-btn" for="json-input">
        <span class="upload-icon">&#x2B06;</span> Load JSON
        <input type="file" id="json-input" accept=".json" hidden />
      </label>
      <button id="print-btn" disabled>Print Booklet</button>
      <label class="view-toggle">
        Preview:
        <select id="layout-mode"
          style="background:var(--paper); color:var(--ink); font-family:var(--mono); font-size:7pt; border:1px solid var(--rule); border-radius:3px; padding:2px 4px; margin-left:4px; outline:none; cursor:pointer;">
          <option value="single">Single Page</option>
          <option value="spread">Reader Spread</option>
          <option value="booklet">Printer Spread</option>
        </select>
      </label>
    </div>



    <div id="status" class="app-status"></div>
  </div>

  <!-- ── BOOKLET OUTPUT ─────────────────────────────── -->
  <div id="booklet-container"></div>

  <!-- PDF generation (Safari can't print booklet spreads via CSS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="renderer.js?v=5"></script>
</body>

</html>
